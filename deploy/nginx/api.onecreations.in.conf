server {
  listen 80;
  listen [::]:80;
  server_name api.onecreations.in;

  # certbot will rewrite this block to listen on 443 with auto-redirect.
  # After `certbot --nginx -d api.onecreations.in`, do not hand-edit.

  # Cap request body at 32kb — the API accepts 8kb JSON; leave slack for webhook raw bodies later.
  client_max_body_size 32k;

  # Security headers belong to helmet (in the Node app), but add one at the edge
  # so it applies even before the upstream is reached.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Let express handle 404s so JSON shape stays consistent.
  error_page 404 = @api_passthrough;
  location @api_passthrough {
    proxy_pass http://127.0.0.1:4000;
  }
}
