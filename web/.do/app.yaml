name: onecreations-web
region: blr
services:
  - name: web
    github:
      repo: pes1ug23am112/OneCreations
      branch: main
      deploy_on_push: true
    source_dir: web
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: https://api.onecreations.in
      - key: NEXT_PUBLIC_ASSET_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
